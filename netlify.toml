[build]
  publish = "."
  command  = ""

# Proxy /api/* and /health to Render backend.
# Replace gaphunter-api with actual slug after Render deploy (Step 2).
[[redirects]]
  from   = "/api/*"
  to     = "https://gaphunter-api.onrender.com/api/:splat"
  status = 200
  force  = true
  [redirects.headers]
    Access-Control-Allow-Origin = "*"

[[redirects]]
  from   = "/health"
  to     = "https://gaphunter-api.onrender.com/health"
  status = 200
  force  = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
